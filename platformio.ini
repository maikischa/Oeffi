; Nahverkehrsanzeige — ESP32 "Cheap Yellow Display" (CYD), 2.8" ST7789.
; All display/pin settings are passed as build_flags below; no User_Setup.h needed.
; Copy src/config.example.h to src/config.h before building.

[env:cyd]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
; Ports auto-detect. Uncomment and set if you have multiple serial devices:
; upload_port = /dev/cu.usbserial-XXXX
; monitor_port = /dev/cu.usbserial-XXXX

lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    bblanchon/ArduinoJson @ ^7.0.0

; Configure TFT_eSPI for the Cheap Yellow Display (CYD / ESP32-2.8-HuangBan)
; ILI9341 driver, 240x320, SPI on VSPI pins
build_flags =
    -DUSER_SETUP_LOADED
    -DST7789_DRIVER
    -DTFT_RGB_ORDER=TFT_BGR
    -DTFT_INVERSION_OFF
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    -DTFT_BACKLIGHT_ON=HIGH
    -DLOAD_GLCD
    -DLOAD_FONT2
    -DLOAD_FONT4
    -DLOAD_FONT6
    -DLOAD_FONT7
    -DLOAD_FONT8
    -DLOAD_GFXFF
    -DSMOOTH_FONT
    -DSPI_FREQUENCY=55000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
