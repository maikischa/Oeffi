; Öffi — ESP32 "Cheap Yellow Display" (CYD) public-transport board, 2.8" ST7789.
; All display/pin settings are passed as build_flags below; no User_Setup.h needed.
; No config file to edit — WiFi, providers and system settings are all on-device
; via the web portal. Just build & flash.

[env:cyd]
platform = espressif32
board = esp32dev
framework = arduino
; Single 3 MB app partition (no OTA) — the web config portal needs the headroom.
board_build.partitions = huge_app.csv
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
; Ports auto-detect. Uncomment and set if you have multiple serial devices:
; upload_port = /dev/cu.usbserial-XXXX
; monitor_port = /dev/cu.usbserial-XXXX

; The web config portal (WebServer, DNSServer, ESPmDNS) and the settings store
; (Preferences/NVS) are part of the arduino-esp32 core — no extra lib_deps.
lib_deps =
    bodmer/TFT_eSPI @ ^2.5.43
    bblanchon/ArduinoJson @ ^7.0.0
    ricmoo/QRCode @ ^0.0.1
    https://github.com/PaulStoffregen/XPT2046_Touchscreen.git

; Configure TFT_eSPI for the Cheap Yellow Display (CYD / ESP32-2.8-HuangBan)
; ILI9341 driver, 240x320, SPI on VSPI pins
build_flags =
    -DUSER_SETUP_LOADED
    -DST7789_DRIVER
    -DTFT_RGB_ORDER=TFT_BGR
    -DTFT_INVERSION_OFF
    -DTFT_WIDTH=240
    -DTFT_HEIGHT=320
    -DTFT_MISO=12
    -DTFT_MOSI=13
    -DTFT_SCLK=14
    -DTFT_CS=15
    -DTFT_DC=2
    -DTFT_RST=-1
    -DTFT_BL=21
    -DTFT_BACKLIGHT_ON=HIGH
    -DLOAD_GLCD
    -DLOAD_FONT2
    -DLOAD_FONT4
    -DLOAD_FONT6
    -DLOAD_FONT7
    -DLOAD_FONT8
    -DLOAD_GFXFF
    -DSMOOTH_FONT
    -DSPI_FREQUENCY=55000000
    -DSPI_READ_FREQUENCY=20000000
    -DSPI_TOUCH_FREQUENCY=2500000
